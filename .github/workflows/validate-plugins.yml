name: plugin

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON manifests
        run: |
          shopt -s nullglob
          for f in .claude-plugin/marketplace.json plugins/*/.claude-plugin/plugin.json; do
            echo "validating $f"
            node -e "const j=require('./$f'); if(!j.name) throw new Error('$f: missing name'); if(!/^[a-z0-9]+(-[a-z0-9]+)*$/.test(j.name)) throw new Error('$f: name must be kebab-case');"
          done

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate Claude Code plugins
        run: |
          shopt -s nullglob
          failed=0
          for dir in plugins/*/; do
            manifest="${dir}.claude-plugin/plugin.json"
            if [[ -f "$manifest" ]]; then
              echo "--- validating $dir ---"
              echo "manifest contents:"
              cat "$manifest"
              echo ""
              echo "JSON syntax check:"
              node -e "JSON.parse(require('fs').readFileSync('$manifest','utf8')); console.log('OK')" || { echo "::error file=$manifest::Invalid JSON syntax"; failed=1; continue; }
              echo "claude plugin validate output:"
              claude plugin validate "$dir" || failed=1
              echo ""
            fi
          done
          exit $failed

      - name: Check generated copies are in sync
        run: |
          ./scripts/sync-plugin.sh
          if ! git diff --quiet; then
            echo "::error::Generated plugin copies are out of sync with their authored sources."
            echo "Run ./scripts/sync-plugin.sh and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
